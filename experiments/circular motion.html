<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원운동과 사인 함수 그래프</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }
        .canvas-container {
            border-radius: 0.75rem;
            background-color: #1f2937;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-6xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold text-cyan-400">원운동과 사인(sin) 함수</h1>
            <p class="text-gray-300 mt-2">원운동하는 물체의 수직 위치(높이)는 사인 함수 그래프를 따라 움직입니다.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 원운동 애니메이션 캔버스 -->
            <div class="canvas-container flex flex-col items-center lg:col-span-1">
                <h2 class="text-xl font-bold mb-4 text-gray-100">원운동 (Circular Motion)</h2>
                <canvas id="circleCanvas" width="400" height="400" class="bg-gray-800 rounded-lg"></canvas>
            </div>
            
            <!-- 사인 그래프 캔버스 -->
            <div class="canvas-container flex flex-col items-center lg:col-span-2">
                <h2 class="text-xl font-bold mb-4 text-gray-100">사인(sin) 그래프</h2>
                <canvas id="graphCanvas" width="400" height="400" class="bg-gray-800 rounded-lg"></canvas>
            </div>
        </div>
        
        <!-- 현재 각도 표시 -->
        <div class="text-center mt-8 p-4 bg-gray-800 rounded-lg max-w-md mx-auto">
            <p class="text-lg">현재 각도 (θ): <span id="angleDisplay" class="font-bold text-yellow-400">0.00</span> 라디안</p>
            <p class="text-lg">sin(θ) 값: <span id="sinDisplay" class="font-bold text-green-400">0.00</span></p>
        </div>
    </div>

    <script>
        // 공통 변수 및 설정
        const circleCanvas = document.getElementById('circleCanvas');
        const circleCtx = circleCanvas.getContext('2d');
        const graphCanvas = document.getElementById('graphCanvas');
        const graphCtx = graphCanvas.getContext('2d');
        const angleDisplay = document.getElementById('angleDisplay');
        const sinDisplay = document.getElementById('sinDisplay');

        // 반응형 캔버스 크기 조절
        function resizeCanvases() {
            // 원운동 캔버스 크기 조절 (정사각형 유지)
            const circleContainerWidth = circleCanvas.parentElement.clientWidth - 48; // padding 1.5rem * 2
            circleCanvas.width = circleContainerWidth;
            circleCanvas.height = circleContainerWidth;

            // 그래프 캔버스 크기 조절 (가로로 길게)
            const graphContainerWidth = graphCanvas.parentElement.clientWidth - 48; // padding 1.5rem * 2
            graphCanvas.width = graphContainerWidth;
            graphCanvas.height = circleContainerWidth; // 높이는 원운동 캔버스와 동일하게 설정
        }

        window.addEventListener('resize', resizeCanvases);
        resizeCanvases();
        
        let angle = 0;
        const speed = 0.02; // 각도 변화 속도
        const points = []; // 그래프 점들을 저장할 배열

        function draw() {
            // 캔버스 크기 가져오기
            const C_WIDTH = circleCanvas.width;
            const C_HEIGHT = circleCanvas.height;
            const G_WIDTH = graphCanvas.width;
            const G_HEIGHT = graphCanvas.height;

            const radius = C_WIDTH * 0.35;
            const circleCenterX = C_WIDTH / 2;
            const circleCenterY = C_HEIGHT / 2;
            
            const graphCenterY = G_HEIGHT / 2;
            const graphAmplitude = G_HEIGHT * 0.35;

            // 1. 원운동 캔버스 그리기
            circleCtx.clearRect(0, 0, C_WIDTH, C_HEIGHT);

            // 축 그리기
            circleCtx.strokeStyle = '#4b5563';
            circleCtx.lineWidth = 1;
            circleCtx.beginPath();
            circleCtx.moveTo(0, circleCenterY);
            circleCtx.lineTo(C_WIDTH, circleCenterY);
            circleCtx.moveTo(circleCenterX, 0);
            circleCtx.lineTo(circleCenterX, C_HEIGHT);
            circleCtx.stroke();

            // 원 그리기
            circleCtx.strokeStyle = '#06b6d4';
            circleCtx.lineWidth = 2;
            circleCtx.beginPath();
            circleCtx.arc(circleCenterX, circleCenterY, radius, 0, Math.PI * 2);
            circleCtx.stroke();

            // 움직이는 점 계산 및 그리기
            const x = circleCenterX + radius * Math.cos(angle);
            // 캔버스 Y좌표는 아래로 갈수록 증가하므로 sin값에 -1을 곱해준다
            const y = circleCenterY - radius * Math.sin(angle); 

            // 반지름 선
            circleCtx.strokeStyle = '#a78bfa';
            circleCtx.beginPath();
            circleCtx.moveTo(circleCenterX, circleCenterY);
            circleCtx.lineTo(x, y);
            circleCtx.stroke();
            
            // 움직이는 점
            circleCtx.fillStyle = '#facc15';
            circleCtx.beginPath();
            circleCtx.arc(x, y, 8, 0, Math.PI * 2);
            circleCtx.fill();
            
            // 수평 연결선 (점 -> y축)
            circleCtx.strokeStyle = '#34d399';
            circleCtx.setLineDash([2, 3]);
            circleCtx.beginPath();
            circleCtx.moveTo(x, y);
            circleCtx.lineTo(circleCenterX, y);
            circleCtx.stroke();
            circleCtx.setLineDash([]);

            // y축 위의 정사영 점 (새로 추가)
            circleCtx.fillStyle = '#34d399'; // 사인 그래프와 같은 색
            circleCtx.beginPath();
            circleCtx.arc(circleCenterX, y, 6, 0, Math.PI * 2); // 중심 x좌표, 움직이는 y좌표
            circleCtx.fill();
            circleCtx.strokeStyle = '#FFFFFF'; // 흰색 테두리
            circleCtx.lineWidth = 1;
            circleCtx.stroke();


            // 2. 그래프 캔버스 그리기
            graphCtx.clearRect(0, 0, G_WIDTH, G_HEIGHT);

            // 축 그리기
            graphCtx.strokeStyle = '#4b5563';
            graphCtx.lineWidth = 1;
            graphCtx.beginPath();
            graphCtx.moveTo(0, graphCenterY);
            graphCtx.lineTo(G_WIDTH, graphCenterY); // x축
            graphCtx.stroke();

            // 현재 sin 값 계산 및 점 배열에 추가
            const sinValue = Math.sin(angle);
            points.unshift({ y: sinValue }); // 새 점을 배열 앞에 추가

            // 점 배열이 캔버스 너비보다 길어지면 오래된 점 삭제
            if (points.length > G_WIDTH) {
                points.pop();
            }

            // 그래프 그리기
            graphCtx.strokeStyle = '#34d399';
            graphCtx.lineWidth = 2;
            graphCtx.beginPath();
            points.forEach((point, i) => {
                const graphX = i;
                const graphY = graphCenterY - point.y * graphAmplitude;
                if (i === 0) {
                    graphCtx.moveTo(graphX, graphY);
                } else {
                    graphCtx.lineTo(graphX, graphY);
                }
            });
            graphCtx.stroke();

            // 그래프 위의 현재 위치 점
            const currentGraphY = graphCenterY - sinValue * graphAmplitude;
            graphCtx.fillStyle = '#facc15';
            graphCtx.beginPath();
            graphCtx.arc(0, currentGraphY, 8, 0, Math.PI * 2);
            graphCtx.fill();
            
            // 3. 연결선 그리기 (원운동 -> 그래프)
            const connectionCtx = document.body.appendChild(document.createElement('canvas')).getContext('2d');
            connectionCtx.canvas.style.position = 'absolute';
            connectionCtx.canvas.style.top = '0';
            connectionCtx.canvas.style.left = '0';
            connectionCtx.canvas.style.pointerEvents = 'none'; // 클릭 방지
            connectionCtx.canvas.width = window.innerWidth;
            connectionCtx.canvas.height = window.innerHeight;

            const circleRect = circleCanvas.getBoundingClientRect();
            const graphRect = graphCanvas.getBoundingClientRect();
            
            const startX = circleRect.left + x;
            const startY = circleRect.top + y;
            const endX = graphRect.left;
            const endY = graphRect.top + currentGraphY;

            connectionCtx.strokeStyle = 'rgba(250, 204, 21, 0.5)';
            connectionCtx.setLineDash([5, 5]);
            connectionCtx.lineWidth = 1;
            connectionCtx.beginPath();
            connectionCtx.moveTo(startX, startY);
            connectionCtx.lineTo(endX, startY);
            connectionCtx.stroke();
            connectionCtx.setLineDash([]);


            // 4. 정보 업데이트 및 다음 프레임 요청
            angle += speed;
            if (angle > Math.PI * 2 * 10) { // 무한히 커지는 것을 방지
                 angle -= Math.PI * 2 * 10;
            }

            // 화면에 현재 값 표시
            angleDisplay.textContent = (angle % (Math.PI * 2)).toFixed(2);
            sinDisplay.textContent = sinValue.toFixed(2);

            requestAnimationFrame(() => {
                // 이전 연결선 캔버스 삭제
                document.body.removeChild(connectionCtx.canvas);
                draw();
            });
        }
        
        // 애니메이션 시작
        draw();
    </script>
</body>
</html>
