<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습용 주기율표 (최종 완성본)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #111827; /* 다크 모드 배경 */
            color: #ffffff;
        }
        .periodic-table, .f-block-elements {
            display: grid;
            grid-template-columns: repeat(18, minmax(0, 1fr));
            gap: 4px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .f-block-elements {
            margin-top: 20px; /* 주기율표 본문과의 간격 */
        }
        .element-card {
            aspect-ratio: 1 / 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .element-card:hover {
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
        }
        .atomic-number {
            font-size: 0.7em;
            position: absolute;
            top: 4px;
            left: 6px;
            color: rgba(255, 255, 255, 0.8);
        }
        .symbol {
            font-size: 1.5em;
            font-weight: 700;
        }
        .name {
            font-size: 0.7em;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
        }

        @media (max-width: 1200px) {
            .symbol { font-size: 1.2em; }
            .name, .atomic-number { font-size: 0.6em; }
        }
        @media (max-width: 768px) {
            .periodic-table, .f-block-elements { gap: 2px; }
            .symbol { font-size: 1em; }
            .name, .atomic-number { font-size: 0.5em; }
            .element-card { border-radius: 4px; }
            #modal .grid {
                grid-template-columns: 1fr;
            }
        }

        /* 팝업 모달 스타일 */
        #modal-backdrop {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 1rem;
            overflow-y: auto;
        }
        #modal {
            background-color: transparent; 
            width: 90%;
            max-width: 950px;
            position: relative;
            transform: scale(0.9);
            opacity: 0;
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        }
        #modal-backdrop.active {
            display: flex;
        }
        #modal-backdrop.active #modal {
            transform: scale(1);
            opacity: 1;
        }
        
        /* 2단계: 원소 분류 색상 지정 */
        .bg-metal { background-color: #0284c7; } /* sky-600 */
        .bg-metalloid { background-color: #14b8a6; } /* teal-500 */
        .bg-nonmetal { background-color: #e11d48; } /* rose-600 */
    </style>
</head>
<body>

    <header class="text-center mt-10 mb-6">
        <h1 class="text-4xl md:text-5xl font-bold text-cyan-400">학습용 주기율표</h1>
        <p class="text-lg text-gray-400 mt-2">원소 카드를 클릭하여 팝업창에서 상세 정보를 확인해보세요.</p>
    </header>

    <main>
        <!-- 주기율표가 그려질 공간 -->
        <div id="periodic-table-container" class="periodic-table"></div>
        <div id="f-block-container" class="f-block-elements"></div>
        
        <!-- 범례 추가 -->
        <div id="legend" class="flex flex-wrap justify-center gap-6 mt-4 mb-8">
            <div class="flex items-center"><div class="w-4 h-4 rounded mr-2 bg-metal"></div><span>금속</span></div>
            <div class="flex items-center"><div class="w-4 h-4 rounded mr-2 bg-metalloid"></div><span>준금속</span></div>
            <div class="flex items-center"><div class="w-4 h-4 rounded mr-2 bg-nonmetal"></div><span>비금속</span></div>
        </div>
    </main>

    <!-- 중앙 팝업창 (모달) - 분리된 2개의 카드 레이아웃 -->
    <div id="modal-backdrop">
        <div id="modal">
            <button id="close-modal" class="absolute top-[-15px] right-[-15px] text-gray-200 bg-gray-800 rounded-full w-10 h-10 flex items-center justify-center hover:bg-gray-700 hover:text-white text-2xl z-10 shadow-lg">&times;</button>
            
            <div class="grid md:grid-cols-2 gap-6">
                <!-- 왼쪽 카드 (물리/화학적 성질, 대표 화합물 및 주요 사용처) -->
                <div class="bg-gray-900/90 backdrop-blur-sm p-6 rounded-xl flex flex-col border border-gray-700 shadow-xl">
                    <div class="flex items-center mb-6">
                        <div id="modal-symbol" class="text-5xl font-bold w-24 h-24 flex items-center justify-center rounded-lg mr-5 border border-gray-600 shadow-inner"></div>
                        <div>
                            <h2 id="modal-name" class="text-3xl font-bold"></h2>
                            <p id="modal-atomic-number" class="text-gray-400 text-base mt-1"></p>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div id="modal-compounds">
                            <h3 class="text-xl font-semibold text-teal-400 border-b border-gray-700 pb-1 mb-2">대표 화합물</h3>
                            <div class="flex gap-6">
                                <div id="modal-hydride-container" class="flex-1">
                                    <p class="font-bold text-gray-400 text-sm mb-1">수소 화합물</p>
                                    <p id="modal-hydride" class="text-lg text-gray-200 bg-gray-800 p-2 rounded-lg border border-gray-700"></p>
                                </div>
                                <div id="modal-oxide-container" class="flex-1">
                                    <p class="font-bold text-gray-400 text-sm mb-1">산화물</p>
                                    <p id="modal-oxide" class="text-lg text-gray-200 bg-gray-800 p-2 rounded-lg border border-gray-700"></p>
                                </div>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-xl font-semibold text-cyan-400 border-b border-gray-700 pb-1 mb-2">물리적 성질</h3>
                            <p id="modal-physical" class="text-gray-300 leading-relaxed"></p>
                        </div>
                        <div>
                            <h3 class="text-xl font-semibold text-green-400 border-b border-gray-700 pb-1 mb-2">화학적 성질</h3>
                            <p id="modal-chemical" class="text-gray-300 leading-relaxed"></p>
                        </div>
                        <div>
                            <h3 class="text-xl font-semibold text-amber-400 border-b border-gray-700 pb-1 mb-2">주요 사용처</h3>
                            <p id="modal-uses" class="text-gray-300 leading-relaxed"></p>
                        </div>
                    </div>
                </div>

                <!-- 오른쪽 카드 (3단계 보어 모형 & 4단계 3D 분자 구조) -->
                <div class="bg-gray-900/90 backdrop-blur-sm p-6 rounded-xl flex flex-col border border-gray-700 shadow-xl overflow-hidden">
                    
                    <!-- 3단계: 보어 원자 모형 -->
                    <div id="bohr-model-section" class="hidden flex-col items-center mb-6">
                        <h3 class="text-xl font-semibold text-purple-400 border-b-2 border-purple-400/30 pb-2 w-full text-left mb-4">보어 원자 모형</h3>
                        <div id="bohr-model-container" class="flex justify-center items-center p-2 rounded-lg w-full h-48"></div>
                        <div id="valence-electron-info" class="text-center mt-2 w-full">
                            <p class="text-lg"><span class="font-bold text-gray-300">원자가 전자 수: </span><span id="valence-electron-count" class="font-bold text-2xl text-purple-400"></span></p>
                        </div>
                    </div>
                    
                    <!-- 3단계: 전자 배치 -->
                    <div id="modal-period2-info" class="hidden mb-4">
                        <h3 class="text-xl font-semibold text-indigo-400 border-b-2 border-indigo-400/30 pb-2 mb-3">전자 배치 (바닥 상태)</h3>
                        <p id="modal-electron-config" class="text-lg text-gray-200 bg-gray-800 p-3 rounded-lg border border-gray-700 tracking-wider"></p>
                    </div>

                    <!-- 4단계: 3D 수소 화합물 분자 구조 -->
                    <div id="modal-hydride-structure-container" class="hidden mt-auto flex-col w-full">
                        <h3 class="text-xl font-semibold text-rose-400 border-b-2 border-rose-400/30 pb-2 mb-3">수소 화합물 분자 구조 (3D)</h3>

                        <div class="flex flex-col gap-2 items-start p-4 rounded-lg bg-gray-800 border border-gray-700">
                            <div class="flex w-full">
                                <p class="flex-1 text-sm"><span class="font-bold text-gray-400">분자 구조:</span> <span id="modal-structure-name" class="text-white ml-2"></span></p>
                                <p class="flex-1 text-sm"><span class="font-bold text-gray-400">결합각:</span> <span id="modal-bond-angle" class="text-white ml-2"></span></p>
                            </div>
                            <div class="flex w-full">
                                <p class="flex-1 text-sm"><span class="font-bold text-gray-400">공유 전자쌍:</span> <span id="modal-bonding-pairs" class="text-white ml-2"></span></p>
                                <p class="flex-1 text-sm"><span class="font-bold text-gray-400">비공유 전자쌍:</span> <span id="modal-nonbonding-pairs" class="text-white ml-2"></span></p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

        // f-block 등 기타 누락 정보 일괄 처리
        elementsData.forEach(el => {

                el.electronConfiguration = '정보 없음';
                el.shellConfiguration = [];
                el.valenceElectrons = '정보 없음';

        const mainTableContainer = document.getElementById('periodic-table-container');
        const fBlockContainer = document.getElementById('f-block-container');
        const modalBackdrop = document.getElementById('modal-backdrop');
        const closeModalBtn = document.getElementById('close-modal');

        // 카테고리별 색상 매핑
        const categoryColors = {
            'metal': 'bg-metal',

        // 4단계: 3D 뷰어 관련 전역 변수
        let scene, camera, renderer, controls, animationFrameId;

        // 보어 모형 SVG 그리기 함수 (껍질 수에 따른 동적 크기 조절 포함)
        function drawBohrModel(elementData, container) {
            container.innerHTML = '';
            const shells = elementData.shellConfiguration;
            if (!shells || shells.length === 0) return;
            const symbol = elementData.symbol;
            
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            
            const electronRadius = 4;
            const padding = 5;
            const maxShellRadius = 25 + ((shells.length - 1) * 18);
            const viewboxRadius = maxShellRadius + electronRadius + padding;
            const viewBoxSize = viewboxRadius * 2;
            const viewBoxMin = 100 - viewboxRadius;
            
            svg.setAttribute('viewBox', `${viewBoxMin} ${viewBoxMin} ${viewBoxSize} ${viewBoxSize}`);
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');

            // 원자핵
            const nucleus = document.createElementNS(svgNS, "circle");
            nucleus.setAttribute('cx', '100');
            nucleus.setAttribute('cy', '100');
            nucleus.setAttribute('r', '15');
            nucleus.setAttribute('fill', 'white');
            svg.appendChild(nucleus);

            const nucleusText = document.createElementNS(svgNS, "text");
            nucleusText.setAttribute('x', '100');
            nucleusText.setAttribute('y', '105');
            nucleusText.setAttribute('text-anchor', 'middle');
            nucleusText.setAttribute('fill', '#1f2937');
            nucleusText.setAttribute('font-weight', 'bold');
            nucleusText.textContent = symbol;
            svg.appendChild(nucleusText);

            // 전자 껍질 및 전자 배치
            shells.forEach((electronCount, i) => {
                const radius = 25 + (i * 18);
                const shellCircle = document.createElementNS(svgNS, "circle");
                shellCircle.setAttribute('cx', '100');
                shellCircle.setAttribute('cy', '100');
                shellCircle.setAttribute('r', radius);
                shellCircle.setAttribute('fill', 'none');
                shellCircle.setAttribute('stroke', 'rgba(255, 255, 255, 0.4)');
                shellCircle.setAttribute('stroke-width', '1');
                svg.appendChild(shellCircle);

                for (let j = 0; j < electronCount; j++) {
                    const angle = (j / electronCount) * 2 * Math.PI + (i * 0.5);
                    const x = 100 + radius * Math.cos(angle);
                    const y = 100 + radius * Math.sin(angle);
                    const electron = document.createElementNS(svgNS, "circle");
                    electron.setAttribute('cx', x);
                    electron.setAttribute('cy', y);
                    electron.setAttribute('r', '4');
                    electron.setAttribute('fill', '#38bdf8');
                    svg.appendChild(electron);
                }
            });
            container.appendChild(svg);
        }

        // 4단계: 3D 뷰어 초기화 및 정리 함수
        function cleanup3DViewer() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            const container = document.getElementById('molecule-3d-container');
            if (container) {
                container.innerHTML = '';
            }
            if (renderer) {
                renderer.dispose();
                renderer.domElement = null;
            }
            scene = null;
            camera = null;
            renderer = null;
            controls = null;
        }

        function init3DViewer(elementData) {
            cleanup3DViewer();
            const container = document.getElementById('molecule-3d-container');
            const structure = elementData.hydrideStructure;
            if (!structure || !container) return;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 4;
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setClearColor(0x000000, 0); // 투명 배경
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;
            controls.rotateSpeed = 0.5;
            controls.autoRotate = true; // 자동 회전 활성화
            controls.autoRotateSpeed = 2.0;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 5, 5);
            scene.add(dirLight);
            
            const moleculeGroup = new THREE.Group();
            scene.add(moleculeGroup);

            // 원소별 색상 재질 설정
            const atomMaterials = {
                H: new THREE.MeshStandardMaterial({ color: 0xffffff }),
                O: new THREE.MeshStandardMaterial({ color: 0xff0000 }),
                N: new THREE.MeshStandardMaterial({ color: 0x0000ff }),
                C: new THREE.MeshStandardMaterial({ color: 0x555555 }),
                B: new THREE.MeshStandardMaterial({ color: 0xffa500 }),
                Be: new THREE.MeshStandardMaterial({ color: 0x00ff00 }),
                F: new THREE.MeshStandardMaterial({ color: 0xffff00 })
            };
            const centralAtomMaterial = atomMaterials[elementData.symbol] || new THREE.MeshStandardMaterial({ color: 0x90ee90 });
            const bondMaterial = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
            const lonePairMaterial = new THREE.MeshStandardMaterial({ color: 0xffa500, transparent: true, opacity: 0.5 });

            const bondLength = 1.3;

            // 중심 원자
            const centralAtom = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), centralAtomMaterial);
            moleculeGroup.add(centralAtom);

            // 주변 원자 및 결합 생성 함수
            const addAtomAndBond = (position, targetSymbol = 'H') => {
                const atom = new THREE.Mesh(new THREE.SphereGeometry(0.25, 32, 32), atomMaterials[targetSymbol]);
                atom.position.copy(position);
                moleculeGroup.add(atom);
                
                const bondGeometry = new THREE.CylinderGeometry(0.08, 0.08, position.length(), 16);
                const bond = new THREE.Mesh(bondGeometry, bondMaterial);
                bond.position.copy(position).multiplyScalar(0.5);
                bond.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), position.clone().normalize());
                moleculeGroup.add(bond);
            };

            // 비공유 전자쌍 생성 함수
            const addLonePair = (position) => {
                const lonePair = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), lonePairMaterial);
                lonePair.position.copy(position);
                moleculeGroup.add(lonePair);
            };

            let atomPositions = [];
            let lonePairPositions = [];

            // 기본 방향 벡터 (정사면체 기준)
            const v1 = new THREE.Vector3(1, 1, 1).normalize().multiplyScalar(bondLength);
            const v2 = new THREE.Vector3(1, -1, -1).normalize().multiplyScalar(bondLength);
            const v3 = new THREE.Vector3(-1, 1, -1).normalize().multiplyScalar(bondLength);
            const v4 = new THREE.Vector3(-1, -1, 1).normalize().multiplyScalar(bondLength);
            
            // 구조에 따른 배치
            switch(structure.name) {
                case '선형':
                    if (elementData.symbol === 'F') { // HF 의 경우 중심 원자를 치우치게
                        moleculeGroup.remove(centralAtom); // 기본 중앙 원자 제거
                        const fAtom = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), atomMaterials.F);
                        fAtom.position.x = -bondLength/2;
                        moleculeGroup.add(fAtom);
                        const hAtom = new THREE.Mesh(new THREE.SphereGeometry(0.25, 32, 32), atomMaterials.H);
                        hAtom.position.x = bondLength/2;
                        moleculeGroup.add(hAtom);
                        
                        const bond = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, bondLength, 16), bondMaterial);
                        bond.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), new THREE.Vector3(1, 0, 0));
                        moleculeGroup.add(bond);
                    } else { // BeH2
                        atomPositions = [new THREE.Vector3(bondLength, 0, 0), new THREE.Vector3(-bondLength, 0, 0)];
                    }
                    break;
                case '평면 삼각형':
                    atomPositions = [
                        new THREE.Vector3(bondLength, 0, 0),
                        new THREE.Vector3(bondLength * Math.cos(2 * Math.PI / 3), bondLength * Math.sin(2 * Math.PI / 3), 0),
                        new THREE.Vector3(bondLength * Math.cos(4 * Math.PI / 3), bondLength * Math.sin(4 * Math.PI / 3), 0)
                    ];
                    break;
                case '정사면체':
                    atomPositions = [v1, v2, v3, v4];
                    break;
                case '삼각뿔':
                    atomPositions = [v2, v3, v4];
                    lonePairPositions = [v1];
                    break;
                case '굽은형':
                    atomPositions = [v3, v4];
                    lonePairPositions = [v1, v2];
                    break;
            }
            
            atomPositions.forEach(pos => addAtomAndBond(pos));
            lonePairPositions.forEach(pos => addLonePair(pos));
            
            // 렌더링 루프
            const animate = () => {
                animationFrameId = requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            };
            animate();
        }

        // 팝업 열기 함수
        function openModal(el) {
            // 1. 왼쪽 카드 정보 세팅

            // 2. 오른쪽 카드 정보 세팅 (보어 모형, 전자 배치)
            const bohrSection = document.getElementById('bohr-model-section');

            const hydrideStructureContainer = document.getElementById('modal-hydride-structure-container');

            if (el.shellConfiguration && el.shellConfiguration.length > 0) {
                bohrSection.classList.remove('hidden');

                drawBohrModel(el, bohrContainer);

                    document.getElementById('valence-electron-count').textContent = el.valenceElectrons;
                } else {
                    document.getElementById('valence-electron-count').textContent = '-';
                }
            } else {
                bohrSection.classList.remove('flex');
                bohrSection.classList.add('hidden');
            }

            if (el.electronConfiguration !== '정보 없음') {
                configSection.classList.remove('hidden');
                document.getElementById('modal-electron-config').textContent = el.electronConfiguration;
                
                // 4단계: 3D 분자 구조 렌더링 호출
                if (el.hydrideStructure) {
                    hydrideStructureContainer.classList.remove('hidden');
                    hydrideStructureContainer.classList.add('flex');
                    document.getElementById('modal-structure-name').textContent = el.hydrideStructure.name;
                    document.getElementById('modal-bond-angle').textContent = el.hydrideStructure.angle;
                    document.getElementById('modal-bonding-pairs').textContent = el.hydrideStructure.bondingPairs;
                    document.getElementById('modal-nonbonding-pairs').textContent = el.hydrideStructure.nonBondingPairs;
                    
                    // 모달이 화면에 표시되어 컨테이너 크기를 계산할 수 있도록 약간의 지연 후 3D 초기화
                    setTimeout(() => init3DViewer(el), 50);
                } else {
                    hydrideStructureContainer.classList.remove('flex');
                    hydrideStructureContainer.classList.add('hidden');
                    cleanup3DViewer();
                }

            } else {
                configSection.classList.add('hidden');
                hydrideStructureContainer.classList.remove('flex');
                hydrideStructureContainer.classList.add('hidden');
                cleanup3DViewer();
            }
            
            modalBackdrop.classList.add('active');
        }

        // 팝업 닫기 함수
        function closeModal() {
            modalBackdrop.classList.remove('active');
            cleanup3DViewer(); // 닫을 때 3D 렌더러 정리
        }

        closeModalBtn.addEventListener('click', closeModal);
        modalBackdrop.addEventListener('click', (e) => {
            if (e.target === modalBackdrop) closeModal();
        });

        // 그리드 렌더링 로직
        elementsData.sort((a, b) => a.number - b.number).forEach(el => {
            const card = document.createElement('div');
            card.classList.add('element-card');
            
            if(el.category && categoryColors[el.category]) {
                card.classList.add(categoryColors[el.category]);
            } else {
                card.style.backgroundColor = '#374151';
            }

            card.innerHTML = `
                <div class="atomic-number">${el.number}</div>
                <div class="symbol">${el.symbol}</div>
                <div class="name">${el.name}</div>
            `;
            card.addEventListener('click', () => openModal(el));

            if (el.period <= 7) {
                card.style.gridColumn = el.group;
                card.style.gridRow = el.period;
                mainTableContainer.appendChild(card);
            } else {
                card.style.gridColumn = el.group;
                card.style.gridRow = (el.period === 8) ? 1 : 2;
                fBlockContainer.appendChild(card);
            }
        });
    </script>
</body>
</html>
